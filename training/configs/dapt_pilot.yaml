run:
  name: oracle-dapt-pilot
  phase: domain_adaptive_pretraining
  launch: manual

model:
  base_model: google/gemma-4-E2B-it
  tokenizer: google/gemma-4-E2B-it
  dtype: bfloat16
  load_in_4bit: false

dataset:
  train_path: corpus/training/pilot/train.jsonl
  text_field: text
  max_seq_length: 4096
  packing: true
  preserve_metadata: true

training:
  objective: causal_lm
  epochs: 1
  learning_rate: 0.00005
  warmup_ratio: 0.02
  weight_decay: 0.01
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  max_grad_norm: 1.0
  save_steps: 250
  logging_steps: 10

evals:
  philosophy_qa: corpus/evals/philosophy_qa.jsonl
  provenance: corpus/evals/provenance.jsonl
  hallucination_traps: corpus/evals/hallucination_traps.jsonl
  oracle_style: corpus/evals/oracle_style.jsonl

output:
  dir: training/runs/oracle-dapt-pilot
  checkpoint_dir: training/runs/oracle-dapt-pilot/checkpoints
